# Aurora Bank - legacy configuration (Spring Boot 1.5 property names)

server.port=8080

# ---- Production: Oracle -----------------------------------------------------
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:ORCL
spring.datasource.username=AURORA
spring.datasource.password=aurora
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ---- Local dev fallback (H2) ------------------------------------------------
# To run without Oracle, comment out the Oracle block above and uncomment:
#spring.datasource.url=jdbc:h2:mem:aurora;DB_CLOSE_DELAY=-1
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=create-drop
